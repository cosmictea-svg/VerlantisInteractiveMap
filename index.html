<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verlantis Interactive Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Exo+2:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Lora', Georgia, serif; background: #080510; }
      #root { max-width: 1200px; margin: 0 auto; height: 100vh; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #12091E; }
      ::-webkit-scrollbar-thumb { background: #3A2860; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #C9A84C; }

      /* ── Landing page animations ── */
      @keyframes logoFadeIn {
        from { opacity: 0; transform: scale(0.92) translateY(24px); }
        to   { opacity: 1; transform: scale(1)    translateY(0);    }
      }
      @keyframes textFadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0);    }
      }
      @keyframes shimmer {
        0%,100% { opacity: 0.5; }
        50%     { opacity: 1;   }
      }
      @keyframes bgShift {
        0%,100% { background-position: 0% 0%; }
        50%     { background-position: 100% 100%; }
      }
      /* Slow ambient drift for secondary blobs between clashes */
      @keyframes ambientHoly {
        0%,100% { transform: translate(0px,0px)    scale(1.00); opacity:0.30; }
        33%     { transform: translate(22px,40px)  scale(1.05); opacity:0.38; }
        66%     { transform: translate(-14px,18px) scale(0.95); opacity:0.25; }
      }
      @keyframes ambientDemonic {
        0%,100% { transform: translate(0px,0px)    scale(1.00); opacity:0.32; }
        33%     { transform: translate(-18px,-36px)scale(1.06); opacity:0.40; }
        66%     { transform: translate(12px,-14px) scale(0.94); opacity:0.26; }
      }

      /*
       * HOLY blob — 3 clashes at 22%, 50%, 80%
       * Patrol is slow/lazy. Rush is a 2% sprint (≈0.48s). Impact is instant.
       * Clash 1 → upper-right,  Clash 2 → centre,  Clash 3 → lower-centre-left
       */
      @keyframes holyClash {
        0%   { transform: translate(0px,  0px)   scale(1.00); opacity:0.50; }
        5%   { transform: translate(18px, 38px)  scale(1.03); opacity:0.52; }
        11%  { transform: translate(-8px, 55px)  scale(0.97); opacity:0.46; }
        17%  { transform: translate(22px, 28px)  scale(1.01); opacity:0.51; }
        /* ── rush 1 ── */
        20%  { transform: translate(20px, 28px)  scale(1.05); opacity:0.60; }
        21%  { transform: translate(90px, 80px)  scale(1.70); opacity:0.92; }
        22%  { transform: translate(138px,112px) scale(2.10); opacity:1.00; } /* IMPACT 1 */
        /* ── recoil 1 ── */
        23%  { transform: translate(102px,84px)  scale(1.40); opacity:0.52; }
        27%  { transform: translate(12px, 18px)  scale(0.87); opacity:0.36; }
        /* ── patrol 2 ── */
        32%  { transform: translate(-5px, 52px)  scale(1.00); opacity:0.48; }
        38%  { transform: translate(28px, 75px)  scale(1.04); opacity:0.53; }
        44%  { transform: translate(8px,  58px)  scale(0.98); opacity:0.47; }
        /* ── rush 2 ── */
        48%  { transform: translate(14px, 58px)  scale(1.05); opacity:0.62; }
        49%  { transform: translate(86px, 158px) scale(1.75); opacity:0.93; }
        50%  { transform: translate(132px,198px) scale(2.15); opacity:1.00; } /* IMPACT 2 */
        /* ── recoil 2 ── */
        51%  { transform: translate(97px, 150px) scale(1.38); opacity:0.50; }
        55%  { transform: translate(10px, 22px)  scale(0.85); opacity:0.35; }
        /* ── patrol 3 ── */
        60%  { transform: translate(5px,  48px)  scale(1.00); opacity:0.49; }
        66%  { transform: translate(32px, 95px)  scale(1.05); opacity:0.54; }
        72%  { transform: translate(-6px, 118px) scale(0.97); opacity:0.47; }
        /* ── rush 3 ── */
        78%  { transform: translate(10px, 115px) scale(1.05); opacity:0.60; }
        79%  { transform: translate(68px, 228px) scale(1.72); opacity:0.91; }
        80%  { transform: translate(102px,270px) scale(2.08); opacity:1.00; } /* IMPACT 3 */
        /* ── recoil 3 ── */
        81%  { transform: translate(76px, 202px) scale(1.35); opacity:0.51; }
        85%  { transform: translate(8px,  32px)  scale(0.86); opacity:0.36; }
        /* ── drift home ── */
        92%  { transform: translate(3px,  12px)  scale(1.00); opacity:0.49; }
        100% { transform: translate(0px,  0px)   scale(1.00); opacity:0.50; }
      }

      /* DEMONIC blob — mirrors holy, from bottom-right */
      @keyframes demonicClash {
        0%   { transform: translate(0px,   0px)   scale(1.00); opacity:0.55; }
        5%   { transform: translate(-16px,-35px)  scale(1.03); opacity:0.57; }
        11%  { transform: translate(7px,  -52px)  scale(0.97); opacity:0.49; }
        17%  { transform: translate(-20px,-26px)  scale(1.01); opacity:0.54; }
        /* ── rush 1 ── */
        20%  { transform: translate(-18px,-26px)  scale(1.05); opacity:0.63; }
        21%  { transform: translate(-87px,-77px)  scale(1.72); opacity:0.93; }
        22%  { transform: translate(-135px,-109px)scale(2.12); opacity:1.00; } /* IMPACT 1 */
        /* ── recoil 1 ── */
        23%  { transform: translate(-99px,-81px)  scale(1.42); opacity:0.53; }
        27%  { transform: translate(-10px,-16px)  scale(0.85); opacity:0.38; }
        /* ── patrol 2 ── */
        32%  { transform: translate(4px,  -49px)  scale(1.00); opacity:0.51; }
        38%  { transform: translate(-25px,-72px)  scale(1.04); opacity:0.56; }
        44%  { transform: translate(-6px, -55px)  scale(0.98); opacity:0.50; }
        /* ── rush 2 ── */
        48%  { transform: translate(-12px,-55px)  scale(1.05); opacity:0.64; }
        49%  { transform: translate(-83px,-155px) scale(1.77); opacity:0.94; }
        50%  { transform: translate(-129px,-194px)scale(2.17); opacity:1.00; } /* IMPACT 2 */
        /* ── recoil 2 ── */
        51%  { transform: translate(-94px,-147px) scale(1.40); opacity:0.51; }
        55%  { transform: translate(-8px, -20px)  scale(0.83); opacity:0.36; }
        /* ── patrol 3 ── */
        60%  { transform: translate(-3px, -45px)  scale(1.00); opacity:0.52; }
        66%  { transform: translate(-30px,-92px)  scale(1.05); opacity:0.57; }
        72%  { transform: translate(5px,  -115px) scale(0.97); opacity:0.49; }
        /* ── rush 3 ── */
        78%  { transform: translate(-8px, -112px) scale(1.05); opacity:0.63; }
        79%  { transform: translate(-65px,-225px) scale(1.74); opacity:0.92; }
        80%  { transform: translate(-99px,-266px) scale(2.10); opacity:1.00; } /* IMPACT 3 */
        /* ── recoil 3 ── */
        81%  { transform: translate(-73px,-198px) scale(1.37); opacity:0.52; }
        85%  { transform: translate(-6px, -30px)  scale(0.84); opacity:0.37; }
        /* ── drift home ── */
        92%  { transform: translate(-2px, -10px)  scale(1.00); opacity:0.52; }
        100% { transform: translate(0px,  0px)    scale(1.00); opacity:0.55; }
      }

      /* ── Clash flash 1 — snaps on at 22%, gone by 24.5% ── */
      @keyframes clashFlash1 {
        0%, 21.5%, 24.5%, 100% { opacity:0; transform:translate(-50%,-50%) scale(0.05); }
        22%  { opacity:1.0; transform:translate(-50%,-50%) scale(0.7);  }
        22.6%{ opacity:0.8; transform:translate(-50%,-50%) scale(1.6);  }
        24%  { opacity:0;   transform:translate(-50%,-50%) scale(2.8);  }
      }
      @keyframes shockRing1 {
        0%, 21.8%, 24.5%, 100% { opacity:0; transform:translate(-50%,-50%) scale(0.05); }
        22%  { opacity:0.9; transform:translate(-50%,-50%) scale(0.2);  }
        23%  { opacity:0.4; transform:translate(-50%,-50%) scale(1.8);  }
        24%  { opacity:0;   transform:translate(-50%,-50%) scale(3.2);  }
      }

      /* ── Clash flash 2 — snaps on at 50% ── */
      @keyframes clashFlash2 {
        0%, 49.5%, 52.5%, 100% { opacity:0; transform:translate(-50%,-50%) scale(0.05); }
        50%  { opacity:1.0; transform:translate(-50%,-50%) scale(0.7);  }
        50.6%{ opacity:0.8; transform:translate(-50%,-50%) scale(1.6);  }
        52%  { opacity:0;   transform:translate(-50%,-50%) scale(2.8);  }
      }
      @keyframes shockRing2 {
        0%, 49.8%, 52.5%, 100% { opacity:0; transform:translate(-50%,-50%) scale(0.05); }
        50%  { opacity:0.9; transform:translate(-50%,-50%) scale(0.2);  }
        51%  { opacity:0.4; transform:translate(-50%,-50%) scale(1.8);  }
        52%  { opacity:0;   transform:translate(-50%,-50%) scale(3.2);  }
      }

      /* ── Clash flash 3 — snaps on at 80% ── */
      @keyframes clashFlash3 {
        0%, 79.5%, 82.5%, 100% { opacity:0; transform:translate(-50%,-50%) scale(0.05); }
        80%  { opacity:1.0; transform:translate(-50%,-50%) scale(0.7);  }
        80.6%{ opacity:0.8; transform:translate(-50%,-50%) scale(1.6);  }
        82%  { opacity:0;   transform:translate(-50%,-50%) scale(2.8);  }
      }
      @keyframes shockRing3 {
        0%, 79.8%, 82.5%, 100% { opacity:0; transform:translate(-50%,-50%) scale(0.05); }
        80%  { opacity:0.9; transform:translate(-50%,-50%) scale(0.2);  }
        81%  { opacity:0.4; transform:translate(-50%,-50%) scale(1.8);  }
        82%  { opacity:0;   transform:translate(-50%,-50%) scale(3.2);  }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
