<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verlantis Interactive Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Exo+2:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Lora', Georgia, serif; background: #080510; }
      #root { max-width: 1200px; margin: 0 auto; height: 100vh; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #12091E; }
      ::-webkit-scrollbar-thumb { background: #3A2860; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #C9A84C; }

      /* ── Landing page animations ── */
      @keyframes logoFadeIn {
        from { opacity: 0; transform: scale(0.92) translateY(24px); }
        to   { opacity: 1; transform: scale(1)    translateY(0);    }
      }
      @keyframes textFadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0);    }
      }
      @keyframes shimmer {
        0%,100% { opacity: 0.5; }
        50%     { opacity: 1;   }
      }
      /* Holy light — drifts from top-left */
      @keyframes holyDrift {
        0%,100% { transform: translate(0,0)       scale(1);    opacity: 0.55; }
        33%     { transform: translate(20px,-28px) scale(1.09); opacity: 0.75; }
        66%     { transform: translate(-14px,18px) scale(0.93); opacity: 0.45; }
      }
      /* Demonic fire — drifts from bottom-right */
      @keyframes demonicDrift {
        0%,100% { transform: translate(0,0)        scale(1);    opacity: 0.6;  }
        33%     { transform: translate(-22px,20px) scale(1.11); opacity: 0.85; }
        66%     { transform: translate(16px,-14px) scale(0.91); opacity: 0.5;  }
      }
      /* Centre clash pulse */
      @keyframes clashPulse {
        0%,100% { opacity: 0.25; transform: scale(1);    }
        50%     { opacity: 0.5;  transform: scale(1.08); }
      }
      /* Slow diagonal bg-gradient shift */
      @keyframes bgShift {
        0%,100% { background-position: 0% 0%;   }
        50%     { background-position: 100% 100%; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
